services:
  # Django веб-сервер
  - type: web
    name: dota2-bot-django
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn dota2_bot_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dota2-bot-database
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ALLOWED_HOSTS
        value: .onrender.com

  # Telegram бот (background worker)
  - type: worker
    name: dota2-bot-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py runbot
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SECRET_KEY
        fromService:
          name: dota2-bot-django
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: dota2-bot-database
          property: connectionString

# Отдельное объявление базы данных PostgreSQL
databases:
  - name: dota2-bot-database
    plan: free
    databaseName: dota2_bot
    user: dota2_bot_user